<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的貓咪主頁</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="cat-theme">
    <!-- 自定義貓爪游標 -->
    <div class="custom-cursor"></div>

    <nav class="navbar">
        <div class="logo">CAT LOVER</div>
        <div class="nav-auth">
            <!-- 層次 A: 按鈕文字旁加入小貓圖標 -->
            <button onclick="toggleModal('login')" class="btn-text">
                <i class="fas fa-cat"></i> 登入
            </button>
            <button onclick="toggleModal('register')" class="btn-primary cat-shape">
                註冊
            </button>
        </div>
    </nav>

    <main class="hero-section">
        <div class="hero-content">
            <h1>歡迎來到喵星人的數位空間</h1>
            <p>這裡是我的專屬領域，充滿了魚乾、貓薄荷與代碼。</p>
            <div class="cta-group">
                <!-- 層次 B: 訪客按鈕做成特殊的貓頭形狀 -->
                <button class="btn-visitor cat-head-btn" onclick="visitorBrowse()">
                    <span>訪客瀏覽</span>
                </button>
            </div>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
