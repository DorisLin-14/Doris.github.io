<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的貓吧</title>
    <style>
        /* =========================================
           【1. 全域變數與基礎設定】
           定義配色與自定義游標
           ========================================= */
        :root {
            --primary-gold: #ff9d00;
            --bg-dark: #1a1a1a;
            --bg-light: #ffffff;
            --card-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        body, html {
            margin: 0; padding: 0;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow-x: hidden;
            /* 貓咪游標設定 */
            cursor: url('assets/cat-paw.png'), auto;
        }

        /* =========================================
           【2. 導覽與固定 UI 元件】
           回到主頁、回到頂部、貓咪按鈕
           ========================================= */
        /* 回到主頁按鈕 (初始隱藏) */
        .nav-home-fixed {
            position: fixed;
            top: 20px; left: 20px;
            z-index: 1000;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            display: none;
            transition: 0.3s;
        }
        .nav-home-btn:hover { background: var(--primary-gold); }

        /* 回到頂部按鈕 (捲動後顯示) */
        #back-to-top {
            position: fixed;
            bottom: 30px; right: 30px;
            z-index: 1000;
            width: 50px; height: 50px;
            border-radius: 50%;
            background: var(--primary-gold);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: none;
            box-shadow: var(--card-shadow);
        }

        /* 統一貓咪風格按鈕 */
        .cat-btn {
            padding: 12px 35px;
            background: url('assets/Button.png') center/cover;
            background-color: var(--primary-gold);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .cat-btn:hover { transform: scale(1.1) rotate(2deg); }

        /* =========================================
           【3. 第一階段：首頁與捲動內頁】
           ========================================= */
        .main-wrapper {
            transition: transform 0.8s ease, opacity 0.6s ease;
        }

        /* 抽牌感核心：頂部淡出遮罩 */
        .scroll-container {
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 15%);
        }

        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #2c3e50 0%, #000 100%);
        }

        .card-section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky; /* 抽牌效果 */
            top: 0;
            background: var(--bg-light);
            color: #333;
            padding: 0 10%;
        }

        /* 卡牌伸出動畫初始態 */
        .card-img {
            width: 350px;
            border-radius: 15px;
            box-shadow: var(--card-shadow);
            transition: 1s cubic-bezier(0.22, 1, 0.36, 1);
            opacity: 0;
        }
        .slide-left { transform: translateX(-150%) rotate(-10deg); }
        .slide-right { transform: translateX(150%) rotate(10deg); }

        /* 動態激活態 */
        .active .card-img { transform: translateX(0) rotate(0deg); opacity: 1; }

        /* =========================================
           【4. 第二階段：作品詳情頁 (翻牌轉場)】
           ========================================= */
        #portfolio-page {
            position: absolute;
            top: 0; left: 0; width: 100%;
            min-height: 100vh;
            display: none;
            background: #111;
            padding: 100px 5% 50px;
            box-sizing: border-box;
            z-index: 2000;
        }

        /* 翻牌動畫 */
        .flip-enter {
            display: block !important;
            animation: flipIn 0.8s forwards;
        }

        @keyframes flipIn {
            from { transform: translateX(100%) rotateY(-90deg); opacity: 0; }
            to { transform: translateX(0) rotateY(0deg); opacity: 1; }
        }

        /* 作品卡牌網格 */
        .work-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 圖片形式的超連結外框 */
        .work-link {
            display: block;
            text-decoration: none;
            background: #222;
            border: 1px solid #333;
            border-radius: 20px;
            overflow: hidden;
            transition: 0.3s;
            color: white;
            padding-bottom: 20px;
        }
        .work-link:hover {
            border-color: var(--primary-gold);
            transform: translateY(-10px);
        }
        .work-link img { width: 100%; height: 250px; object-fit: cover; }
        .work-link h3 { margin: 15px; font-size: 1.4rem; }

        /* 頁面淡出樣式 */
        .exit-left { transform: translateX(-100%); opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <!-- 固定導覽 UI -->
    <button class="nav-home-fixed" id="homeBtn" onclick="backToHome()">🏠 回到主頁</button>
    <button id="back-to-top" onclick="window.scrollTo({top:0, behavior:'smooth'})">▲</button>

    <!-- 第一階段內容容器 -->
    <div id="main-content" class="main-wrapper">
        
        <!-- 首頁 -->
        <section class="hero-section">
            <h1 style="font-size: 3rem;">My Cat Bar</h1>

            <p style="margin-top: 30px; opacity: 0.7;">往下滑動，或點擊開始瀏覽</p>
            <button class="cat-btn" onclick="document.getElementById('intro').scrollIntoView()">開始瀏覽</button>
        </section>

        <!-- 捲動內頁區塊 -->
        <div class="scroll-container">
            <section class="card-section" id="intro">
                <div class="card-img slide-left">
                    <img src="assets/sticker_19.png" alt="我" style="width:100%; border-radius:10px;">
                </div>
                <div style="flex:1; padding-left: 50px;">
                    <h2>關於我 🙋🏻‍</h2>
                    <p>希望能運用AI、生活中熱愛的興趣、喜歡的事物來化想像為現實。</p>
                </div>
            </section>

            <section class="card-section" id="works-trigger">
                <div style="flex:1; padding-right: 50px; text-align: right;">
                    <h2>作品展示</h2>
                    <p>探索我和AI的工作成果，未來想到什麼可能會持續增加!</p>
                    <button class="cat-btn" onclick="openPortfolio()">查看更多</button>
                </div>
                <div class="card-img slide-right">
                    <img src="assets/sticker_14.png" alt="作品" style="width:100%; border-radius:10px;">
                </div>
            </section>
        </div>
    </div>

    <!-- 第二階段：作品詳情頁 -->
    <div id="portfolio-page">
        <h1 style="text-align: center; margin-bottom: 50px;">PORTFOLIO</h1>
        <div class="work-grid">
            
            <!-- 作品卡牌 A -->
            <a href="https://line.me/S/sticker/33840747?_from=lcm" class="work-link" target="_blank">
                <img src="assets/sticker_1.png" alt="貼圖 / 表情">
                <h3>LINE 貼圖：呆橘貓</h3>
            </a>

            <!-- 作品卡牌 B -->
            <a href="https://your-work-link2.com" class="work-link" target="_blank">
                <img src="assets/sticker_18.png" alt="設計 / 視覺">
                <h3>平面排版：無</h3>
            </a>

            <!-- 我的履歷 -->
            <a href="MyProfile" class="work-link" target="_blank">
                <img src="assets/sticker_5.png" alt="我的履歷">
                <div class="info"><h3>我的履歷</h3><p>請看看我 🎈</p></div>
            </a>

            <!-- 網頁遊戲 -->
            <a href="MyWebG - RE" class="work-link" target="_blank">
                <img src="assets/sticker_7.png" alt="網頁遊戲">
                <div class="info"><h3>網頁遊戲</h3><p>點擊進入文字冒險</p></div>
            </a>

        </div>
    </div>

    <script>
        /* =========================================
           【5. 邏輯控制中心】
           ========================================= */

        // 1. 偵測區塊進入視窗 (觸發伸出動畫)
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.5 });

        document.querySelectorAll('.card-section').forEach(s => observer.observe(s));

        // 2. 切換至作品集頁面 (翻牌轉場)
        function openPortfolio() {
            document.getElementById('main-content').classList.add('exit-left');
            const port = document.getElementById('portfolio-page');
            port.classList.add('flip-enter');
            document.getElementById('homeBtn').style.display = 'block';
            window.scrollTo(0, 0);
        }

        // 3. 回到首頁
        function backToHome() {
            document.getElementById('main-content').classList.remove('exit-left');
            document.getElementById('portfolio-page').classList.remove('flip-enter');
            document.getElementById('homeBtn').style.display = 'none'; // 隱藏左上角按鈕
            window.scrollTo(0, 0);
        }

        // 4. 回到頂部按鈕偵測
        window.onscroll = function() {
            const btn = document.getElementById('back-to-top');
            if (window.scrollY > 800) btn.style.display = 'block';
            else btn.style.display = 'none';
        };
    </script>
</body>
</html>
