<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的貓吧 | My Cat Bar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 固定 UI -->
    <button class="nav-home-fixed" id="homeBtn" onclick="backToHome()">🏠 回到主頁</button>
    <button id="back-to-top" onclick="scrollToTop()">▲</button>

    <!-- 將所有的 card-section 都包在一個 scroll-snap 容器中（可選，增加段落感） -->
    <div id="main-content" class="main-wrapper">
        <!-- 主畫面：獨立的一塊 -->
        <section class="hero-section">
            <h1 style="font-size: 3.5rem;">My Cat Bar</h1>
            <p style="opacity: 0.7;">化想像為現實的貓咪創意空間</p>
            <button class="cat-btn" onclick="scrollToAbout()">開始瀏覽</button>
        </section>

    <!-- 第一階段：主頁面 -->
    <div id="main-content" class="main-wrapper">
        <section class="hero-section">
            <h1 style="font-size: 3.5rem;">My Cat Bar</h1>
            <p style="opacity: 0.7;">化想像為現實的貓咪創意空間</p>
            <button class="cat-btn" onclick="scrollToAbout()">開始瀏覽</button>
        </section>

        <section class="card-section" id="intro">
            <div class="card-img slide-left">
                <img src="./assets/sticker_19.png" alt="我" style="width:100%; border-radius:10px;">
            </div>
            <div style="flex:1; padding-left: 50px;">
                <h2>關於我 🙋🏻‍♂️</h2>
                <p>希望能運用AI、生活中熱愛的興趣、喜歡的事物來化想像為現實。</p>
                <a href="./MyProfile/" class="cat-btn" target="_blank">我的履歷</a>
            </div>
        </section>

        <section class="card-section" id="products-trigger">
            <div style="flex:1; padding-right: 50px; text-align: right;">
                <h2>我的商品 🛍️</h2>
                <p>收藏了我和AI產出的小物，點擊進入商店。</p>
                <button class="cat-btn" onclick="openPortfolio()">進入商店</button>
            </div>
            <div class="card-img slide-right">
                <img src="./assets/sticker_14.png" alt="商品" style="width:100%; border-radius:10px;">
            </div>
        </section>

        <section class="card-section" id="works-trigger">
            <div class="card-img slide-left">
                <img src="./assets/sticker_7.png" alt="作品" style="width:100%; border-radius:10px;">
            </div>
            <div style="flex:1; padding-left: 50px;">
                <h2>作品展示</h2>
                <p>探索我和AI的工作成果。</p>
                <button class="cat-btn" onclick="flipToWorksFromHome()">查看全集</button>
            </div>
        </section>
    </div>

    <!-- 第二階段：商品詳情頁 -->
    <div id="portfolio-page" class="page-container">
        <h1 style="text-align: center;">項目清單</h1>
        <div class="work-grid">
            <a href="https://line.me/S/sticker/33840747?_from=lcm" class="work-link" target="_blank">
                <img src="./assets/sticker_1.png" alt="呆橘貓">
                <h3>LINE 貼圖：呆橘貓</h3>
            </a>
            <a href="https://line.me/S/sticker/33898118?_from=lcm" class="work-link" target="_blank">
                <img src="./assets/WhiteCat.png" alt="聰明白貓">
                <h3>LINE 貼圖：聰明白貓</h3>
            </a>
        </div>
        <div style="text-align: right; max-width: 1200px; margin: 50px auto;">
            <button class="cat-btn" onclick="flipToWorks()">前往作品展示 ➔</button>
        </div>
    </div>

    <!-- 第三階段：作品展示頁 -->
    <div id="works-page" class="page-container">
        <h1 style="text-align: center;">作品展示 🎨</h1>
        <div class="work-grid">
            <a href="./MyWebG - RE/" class="work-link" target="_blank">
                <img src="assets/sticker_7.png" alt="網頁遊戲">
                <h3>網頁遊戲作品</h3>
            </a>
            <a href="#" class="work-link" target="_blank">
                <img src="./assets/sticker_18.png" alt="繪圖">
                <h3>小動物插圖</h3>
            </a>
        </div>
        <div style="text-align: left; max-width: 1200px; margin: 50px auto;">
            <button class="cat-btn" onclick="flipBackToPortfolio()">⬅ 返回商品頁</button>
        </div>
        <div class="cat-photo-wall">
            <img src="./assets/Cookie.jpg" alt="吉祥物">
            <p>最樂天的陽光貓貓</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
